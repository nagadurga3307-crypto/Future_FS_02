<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini CRM Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    background:#f4f7fc;
}

/* Sidebar */

.sidebar{
    position:fixed;
    left:0;
    top:0;
    width:250px;
    height:100vh;
    background:#1e3a8a;
    padding-top:20px;
}

.sidebar h2{
    text-align:center;
    color:white;
    margin-bottom:30px;
}

.sidebar a{
    display:block;
    color:white;
    text-decoration:none;
    padding:15px 25px;
    font-size:16px;
    transition:0.3s;
}

.sidebar a:hover{
    background:#2563eb;
}

/* Main Content */

.main-content{
    margin-left:250px;
    padding:30px;
}

/* Header */

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:30px;
}

.header h1{
    color:#1f2937;
}

.header p{
    color:#6b7280;
}

/* Cards */

.cards{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.card h3{
    color:#6b7280;
    margin-bottom:10px;
}

.card h2{
    color:#2563eb;
    font-size:32px;
}

/* Table Section */

.table-section{
    background:white;
    margin-top:30px;
    padding:25px;
    border-radius:15px;
    box-shadow:0 4px 10px rgba(0,0,0,0.08);
}

.table-section h2{
    margin-bottom:20px;
    color:#1f2937;
}

table{
    width:100%;
    border-collapse:collapse;
}

table th{
    background:#2563eb;
    color:white;
    padding:12px;
    text-align:left;
}

table td{
    padding:12px;
    border-bottom:1px solid #e5e7eb;
}

/* Status Badges */

.new{
    background:#dbeafe;
    color:#1d4ed8;
    padding:6px 12px;
    border-radius:20px;
    font-size:14px;
}

.contacted{
    background:#fef3c7;
    color:#b45309;
    padding:6px 12px;
    border-radius:20px;
    font-size:14px;
}

.converted{
    background:#dcfce7;
    color:#15803d;
    padding:6px 12px;
    border-radius:20px;
    font-size:14px;
}

/* Responsive */

@media(max-width:768px){

.sidebar{
    width:100%;
    height:auto;
    position:relative;
}

.main-content{
    margin-left:0;
}

.cards{
    grid-template-columns:1fr;
}

}
</style>

</head>
<body>

<div class="sidebar">
    <h2>Mini CRM</h2>

    <a href="#">Dashboard</a>
    <a href="#">Add Lead</a>
    <a href="#">Manage Leads</a>
    <a href="#">Contact</a>
    <a href="#">Logout</a>
</div>

<div class="main-content">

    <div class="header">
        <h1>CRM Dashboard</h1>
        <p>Welcome Admin 👋</p>
    </div>

    <div class="cards">

        <div class="card">
            <h3>Total Leads</h3>
            <h2>25</h2>
        </div>

        <div class="card">
            <h3>New Leads</h3>
            <h2>10</h2>
        </div>

        <div class="card">
            <h3>Contacted</h3>
            <h2>8</h2>
        </div>

        <div class="card">
            <h3>Converted</h3>
            <h2>7</h2>
        </div>

    </div>

    <div class="table-section">

        <h2>Recent Leads</h2>

        <table>

            <thead>
                <tr>
                    <th>Name</th>
                    <th>Email</th>
                    <th>Status</th>
                </tr>
            </thead>

            <tbody>

                <tr>
                    <td>John Doe</td>
                    <td>john@gmail.com</td>
                    <td><span class="new">New</span></td>
                </tr>

                <tr>
                    <td>David Smith</td>
                    <td>david@gmail.com</td>
                    <td><span class="contacted">Contacted</span></td>
                </tr>

                <tr>
                    <td>Alex Johnson</td>
                    <td>alex@gmail.com</td>
                    <td><span class="converted">Converted</span></td>
                </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
