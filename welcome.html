<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini CRM - Welcome</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    height:100vh;
    background:linear-gradient(135deg,#2563eb,#1e3a8a);
    display:flex;
    justify-content:center;
    align-items:center;
}

.container{
    text-align:center;
    background:white;
    padding:60px;
    border-radius:20px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
    max-width:700px;
}

.container h1{
    font-size:48px;
    color:#2563eb;
    margin-bottom:15px;
}

.container h2{
    color:#333;
    margin-bottom:20px;
}

.container p{
    color:#666;
    line-height:1.8;
    margin-bottom:30px;
}

.btn{
    display:inline-block;
    padding:14px 35px;
    background:#2563eb;
    color:white;
    text-decoration:none;
    border-radius:8px;
    font-size:18px;
    transition:0.3s;
}

.btn:hover{
    background:#1d4ed8;
}

.features{
    display:flex;
    justify-content:center;
    gap:20px;
    margin-top:30px;
    flex-wrap:wrap;
}

.feature-box{
    background:#f4f7fc;
    padding:15px 20px;
    border-radius:10px;
    min-width:150px;
}

.feature-box h3{
    color:#2563eb;
    margin-bottom:5px;
}

.feature-box p{
    margin:0;
    font-size:14px;
}

</style>
</head>
<body>

<div class="container">

    <h1>Mini CRM</h1>

    <h2>Client Lead Management System</h2>

    <p>
        Manage customer leads efficiently, track follow-ups,
        update lead status, and organize business contacts
        in one place.
    </p>

    <a href="login.html" class="btn">
        Get Started
    </a>

    <div class="features">

        <div class="feature-box">
            <h3>Manage Leads</h3>
            <p>Store and organize leads</p>
        </div>

        <div class="feature-box">
            <h3>Track Status</h3>
            <p>Monitor lead progress</p>
        </div>

        <div class="feature-box">
            <h3>Easy Access</h3>
            <p>Simple CRM dashboard</p>
        </div>

    </div>

</div>

</body>
</html>
