<!-- Contact Section -->

<section class="contact">

    <div class="contact-box">

        <h1>Contact Us</h1>

        <p>Have questions? Send us a message.</p>

        <form>

            <input type="text"
            placeholder="Your Name"
            required>

            <input type="email"
            placeholder="Your Email"
            required>

            <input type="text"
            placeholder="Subject"
            required>

            <textarea
            rows="6"
            placeholder="Write your message..."
            required></textarea>

            <button type="submit">
                Send Message
            </button>

        </form>

    </div>

    <div class="info-box">

        <h2>Contact Information</h2>

        <p><i class="fa-solid fa-location-dot"></i> Vijayawada, Andhra Pradesh</p>

        <p><i class="fa-solid fa-phone"></i> +91 9876543210</p>

        <p><i class="fa-solid fa-envelope"></i> minicrm@gmail.com</p>

        <p><i class="fa-solid fa-globe"></i> www.minicrm.com</p>

    </div>

</section>

<footer>

    <p>© 2026 Mini CRM | All Rights Reserved</p>

</footer>

</body>

</html>
