<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini CRM - Login</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg,#2563eb,#1e3a8a);
}

.login-container{
    width:400px;
    background:#fff;
    padding:40px;
    border-radius:15px;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.logo{
    text-align:center;
    margin-bottom:25px;
}

.logo h1{
    color:#2563eb;
    font-size:32px;
}

.logo p{
    color:#666;
    margin-top:5px;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
    color:#333;
    font-weight:600;
}

.input-group input{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    font-size:15px;
}

.input-group input:focus{
    border-color:#2563eb;
}

.login-btn{
    width:100%;
    padding:13px;
    border:none;
    background:#2563eb;
    color:white;
    font-size:16px;
    border-radius:8px;
    cursor:pointer;
    transition:0.3s;
}

.login-btn:hover{
    background:#1d4ed8;
}

.credentials{
    margin-top:20px;
    background:#f4f7fc;
    padding:12px;
    border-radius:8px;
    text-align:center;
    color:#555;
    font-size:14px;
}

.error{
    color:red;
    text-align:center;
    margin-top:15px;
}

</style>

</head>
<body>

<div class="login-container">

    <div class="logo">
        <h1>Mini CRM</h1>
        <p>Admin Login Portal</p>
    </div>

    <form id="loginForm">

        <div class="input-group">
            <label>Email Address</label>
            <input type="email"
                   id="email"
                   placeholder="Enter Email"
                   required>
        </div>

        <div class="input-group">
            <label>Password</label>
            <input type="password"
                   id="password"
                   placeholder="Enter Password"
                   required>
        </div>

        <button type="submit" class="login-btn">
            Login
        </button>

        <p id="message" class="error"></p>

    </form>

    <div class="credentials">
        <strong>Demo Login</strong><br>
        Email: admin@gmail.com<br>
        Password: admin123
    </div>

</div>

<script>

document.getElementById("loginForm").addEventListener("submit", function(e){

    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    if(email === "admin@gmail.com" &&
       password === "admin123"){

        window.location.href = "dashboard.html";
    }
    else{

        document.getElementById("message").innerText =
        "Invalid Email or Password!";
    }

});

</script>

</body>
</html>
