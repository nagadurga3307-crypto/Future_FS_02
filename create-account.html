    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
</head>

<body>

<!-- Navigation Bar -->

<nav class="navbar">

    <div class="logo">
        Mini CRM
    </div>

    <ul class="nav-menu">

        <li><a href="index.html">Home</a></li>

<!-- Create Account Form -->

<section class="register">

    <div class="register-box">

        <h1>Create Account</h1>

        <p>Create your Mini CRM account to manage client leads.</p>

        <form action="#">

            <input type="text"
            placeholder="Full Name"
            required>

            <input type="email"
            placeholder="Email Address"
            required>

            <input type="tel"
            placeholder="Phone Number"
            required>

            <input type="password"
            placeholder="Password"
            required>

            <input type="password"
            placeholder="Confirm Password"
            required>

            <button type="submit">
                Create Account
            </button>

        </form>

        <div class="bottom-text">

            Already have an account?

            <a href="admin-login.html">
                Login Here
            </a>

        </div>

    </div>

</section>

</body>
</html>
